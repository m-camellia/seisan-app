<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精算アプリ</title>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="精算アプリ">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    background: #f0f2f5;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 16px;
  }

  h1 {
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 20px;
    color: #1a1a18;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .card h2 {
    font-size: 0.85rem;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
  }

  /* Members */
  .members-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .member-input {
    position: relative;
  }

  .member-num {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.7rem;
    color: #ccc;
    pointer-events: none;
    z-index: 1;
  }

  .member-input input[type="text"] {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 9px 28px 9px 22px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .member-input input[type="text"]:focus { border-color: #8b6f5e; }

  .btn-del-member {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 0.85rem;
    padding: 4px 4px;
    line-height: 1;
    transition: color 0.2s;
  }

  .btn-del-member:hover { color: #e55; }

  /* Items */
  .items-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 0.88rem;
  }

  .items-table th {
    background: #1a3a5c;
    color: #fff;
    padding: 8px 6px;
    font-weight: 600;
    font-size: 0.8rem;
    text-align: center;
    white-space: nowrap;
  }

  .items-table th.th-item { text-align: left; }

  /* 項目名列を固定 */
  .th-sticky {
    position: sticky;
    left: 0;
    z-index: 3;
    background: #1a3a5c;
    text-align: left;
    min-width: 110px;
  }

  .td-sticky {
    position: sticky;
    left: 0;
    z-index: 1;
    background: #fff;
    border-right: 1px solid #e8e8e8;
  }

  .items-table tr:hover .td-sticky { background: #fafafa; }
  .total-row .td-sticky { background: #fffde7 !important; }

  .items-table td {
    padding: 6px 4px;
    border-bottom: 1px solid #f0f0f0;
    text-align: center;
    vertical-align: middle;
  }

  .items-table tr:last-child td { border-bottom: none; }
  .items-table tr:hover td { background: #fafafa; }

  .input-item {
    width: 100%;
    border: none;
    background: transparent;
    font-size: 0.88rem;
    outline: none;
    padding: 2px 4px;
  }

  .input-item:focus { background: #fffbf8; border-radius: 4px; }

  .input-amount {
    width: 90px;
    border: 1px solid #ddd;
    background: #fff;
    border-radius: 8px;
    font-size: 0.88rem;
    text-align: right;
    outline: none;
    padding: 6px 8px;
    transition: border-color 0.2s;
  }

  .input-amount:focus { border-color: #8b6f5e; background: #fffbf8; }

  input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: #1a3a5c;
    cursor: pointer;
  }

  .per-person {
    font-size: 0.78rem;
    color: #8b6f5e;
    font-variant-numeric: tabular-nums;
    min-height: 1em;
  }

  .btn-add {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1.5px dashed #ccc;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 0.85rem;
    color: #999;
    margin-top: 10px;
    width: 100%;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }

  .btn-add:hover { border-color: #8b6f5e; color: #8b6f5e; }

  .btn-del {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s;
  }

  .btn-del:hover { color: #e55; }

  /* Adjustments */
  .adj-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .adj-item { display: flex; flex-direction: column; gap: 4px; }

  .adj-label {
    font-size: 0.78rem;
    color: #888;
    font-weight: 600;
  }

  .adj-input {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 0.95rem;
    text-align: right;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .adj-input:focus { border-color: #8b6f5e; }

  /* Summary */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .summary-card {
    background: #f7f4ef;
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }

  .summary-card .s-name { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
  .summary-card .s-amount { font-size: 1.2rem; font-weight: 700; color: #1a1a18; font-variant-numeric: tabular-nums; }
  .summary-card .s-detail { font-size: 0.72rem; color: #8b6f5e; margin-top: 2px; }

  /* Settlement */
  .settlement-list { list-style: none; }

  .settlement-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: #f7f4ef;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 0.9rem;
  }

  .settlement-list li:last-child { margin-bottom: 0; }
  .s-arrow { color: #8b6f5e; margin: 0 8px; }
  .s-pay-amount { font-weight: 700; color: #1a3a5c; font-variant-numeric: tabular-nums; }

  .no-settlement { text-align: center; color: #bbb; font-size: 0.9rem; padding: 12px 0; }

  /* Footer total row */
  .total-row td { background: #fffde7 !important; font-weight: 700; font-size: 0.9rem; }

  /* Payer badge */
  .payer-badge {
    display: inline-block;
    font-size: 0.65rem;
    background: #1a3a5c;
    color: #fff;
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 4px;
    vertical-align: middle;
  }

  .payer-section { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .payer-section label { font-size: 0.85rem; color: #666; }
  .payer-section select {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.88rem;
    outline: none;
    cursor: pointer;
  }

  .section-divider { border: none; border-top: 1px solid #eee; margin: 12px 0; }
  .table-wrap { overflow-x: auto; }

  @media (max-width: 480px) {
    .members-grid, .adj-grid, .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .input-amount { width: 72px; }
  }
</style>
</head>
<body>

<!-- Password overlay -->
<div id="pw-overlay" style="
  position:fixed; inset:0; background:#f0f2f5;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:9999; gap:16px;">
  <div style="font-size:2rem">🎡</div>
  <div style="font-size:1.2rem; font-weight:700; color:#1a1a18">精算アプリ</div>
  <input id="pw-input" type="text" placeholder="パスワードを入力" autocomplete="off"
    style="border:1px solid #ddd; border-radius:8px; padding:10px 16px; font-size:1rem; outline:none; text-align:center; width:220px;"
    onkeydown="if(event.key==='Enter') checkPw();">
  <button onclick="checkPw()" style="
    background:#1a3a5c; color:#fff; border:none; border-radius:8px;
    padding:10px 32px; font-size:1rem; cursor:pointer;">入る</button>
  <div id="pw-error" style="color:#e55; font-size:0.85rem; min-height:1em;"></div>
</div>

<script>
// 認証済みならオーバーレイをスキップ
if (localStorage.getItem('seisan-auth') === 'ok') {
  document.getElementById('pw-overlay').style.display = 'none';
}

function checkPw() {
  if (document.getElementById('pw-input').value === 'king') {
    localStorage.setItem('seisan-auth', 'ok');
    document.getElementById('pw-overlay').style.display = 'none';
  } else {
    document.getElementById('pw-error').textContent = 'パスワードが違います';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
</script>

<h1>🎡 精算</h1>

<!-- Members -->
<div class="card">
  <h2>メンバー</h2>
  <div class="members-grid" id="membersGrid"></div>
  <button class="btn-add" onclick="addMember()" style="margin-top:10px">＋ メンバーを追加</button>
  <hr class="section-divider">
  <div class="payer-section">
    <label>立替払い担当：</label>
    <select id="payerSelect"></select>
    <span style="font-size:0.8rem;color:#bbb;">← 全額を立て替えた人</span>
  </div>
</div>

<!-- Items -->
<div class="card">
  <h2>項目</h2>
  <div class="table-wrap">
    <table class="items-table" id="itemsTable">
      <thead><tr id="headerRow"></tr></thead>
      <tbody id="itemsBody"></tbody>
      <tfoot id="itemsFoot"></tfoot>
    </table>
  </div>
  <button class="btn-add" onclick="addItem()">＋ 項目を追加</button>
</div>

<!-- Adjustments -->
<div class="card">
  <h2>手動調整</h2>
  <div class="adj-grid" id="adjGrid"></div>
  <p style="font-size:0.75rem;color:#bbb;margin-top:10px;text-align:center">＋ : 多く払う　／　− : 少なく払う</p>
</div>

<!-- Summary -->
<div class="card">
  <h2>各自の負担額</h2>
  <div class="summary-grid" id="summaryGrid"></div>
  <hr class="section-divider">
  <h2>精算方法</h2>
  <ul class="settlement-list" id="settlementList"></ul>
</div>

<script>
// ── State ──────────────────────────────────────────────
const state = {
  members: ['わし', 'あめ', 'あや', 'れい', 'なみ'],
  payerIndex: 0,
  items: [
    { name: 'タクシー',          amount: 6370, included: [true, true, true, true,  true] },
    { name: 'ロッカー',          amount:  800, included: [true, true, true, true,  true] },
    { name: 'チュロス',          amount: 3000, included: [true, true, true, true,  true] },
    { name: 'ビール',            amount: 3200, included: [true, true, true, false, true] },
    { name: 'ポップコーン'      , amount:  400, included: [true, true, true, true,  true] },
  ],
  adjustments: [256, -14, -14, -214, -14],
};

// ── Helpers ─────────────────────────────────────────────
const fmt = n => Math.round(n).toLocaleString('ja-JP');

// 全メンバーのインデックス一覧（空スロットなし）
const activeIdx = () => state.members.map((_, i) => i);

// 各人の項目合計
function calcItemTotals() {
  return state.members.map((_, mi) => {
    return state.items.reduce((sum, item) => {
      if (!item.included[mi]) return sum;
      const cnt = activeIdx().filter(i => item.included[i]).length;
      return sum + (cnt > 0 ? item.amount / cnt : 0);
    }, 0);
  });
}

// 立替担当の調整額を自動計算（他メンバーの調整合計の符号反転）
function syncPayerAdj() {
  const payer = state.payerIndex;
  const sumOthers = activeIdx()
    .filter(i => i !== payer)
    .reduce((s, i) => s + state.adjustments[i], 0);
  state.adjustments[payer] = -sumOthers;
}

// ── Render ──────────────────────────────────────────────
function render() {
  renderMembers();
  renderPayer();
  renderTable();
  renderAdjustments();
  renderSummary();
}

function renderMembers() {
  const grid = document.getElementById('membersGrid');
  grid.innerHTML = '';
  state.members.forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'member-input';
    div.innerHTML = `
      <span class="member-num">${i + 1}</span>
      <input type="text" value="${name}" placeholder="名前を入力"
        oninput="state.members[${i}]=this.value;"
        onblur="fullRender();">
      <button class="btn-del-member" onclick="removeMember(${i})"
        style="${state.members.length <= 2 ? 'visibility:hidden' : ''}">×</button>
    `;
    grid.appendChild(div);
  });
}

function renderPayer() {
  const sel = document.getElementById('payerSelect');
  sel.innerHTML = '';
  activeIdx().forEach(i => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = state.members[i];
    if (i === state.payerIndex) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.onchange = () => {
    state.payerIndex = +sel.value;
    syncPayerAdj();
    renderAdjustments();
    renderSummary();
  };
}

function renderTable() {
  const ai = activeIdx();

  // ─ Header ─
  const headerRow = document.getElementById('headerRow');
  headerRow.innerHTML = '';
  ['#', '項目名', '合計金額', ...ai.map(i => state.members[i]), ''].forEach((text, hi, arr) => {
    const th = document.createElement('th');
    th.textContent = text;
    if (hi === 0) th.style.width = '28px';
    if (hi === 1) th.className = 'th-sticky';
    if (hi === 2) th.style.minWidth = '100px';
    if (hi >= 3 && hi < arr.length - 1) th.style.minWidth = '56px';
    if (hi === arr.length - 1) th.style.width = '36px';
    headerRow.appendChild(th);
  });

  // ─ Body ─
  const tbody = document.getElementById('itemsBody');
  tbody.innerHTML = '';

  state.items.forEach((item, idx) => {
    const cnt = ai.filter(i => item.included[i]).length;
    const per = cnt > 0 ? item.amount / cnt : 0;

    const tr = document.createElement('tr');
    // 金額入力: oninput でテーブル全体を再描画せず、span だけ更新する
    let cells = `
      <td style="color:#bbb;font-size:0.8rem">${idx + 1}</td>
      <td class="td-sticky"><input class="input-item" type="text" value="${item.name}" placeholder="項目名"
          oninput="state.items[${idx}].name=this.value"></td>
      <td>
        <input class="input-amount" type="text" inputmode="numeric"
          value="${item.amount > 0 ? fmt(item.amount) : ''}" placeholder="0"
          onfocus="this.value=state.items[${idx}].amount||'';"
          oninput="const v=parseInt(this.value.replace(/[^0-9]/g,''))||0; state.items[${idx}].amount=v; updateItemDisplay(${idx}); renderSummary();"
          onblur="this.value=state.items[${idx}].amount>0?fmt(state.items[${idx}].amount):''; renderTable(); renderSummary();">
      </td>
    `;

    ai.forEach(mi => {
      const chk = item.included[mi] ? 'checked' : '';
      cells += `<td>
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px">
          <input type="checkbox" ${chk}
            onchange="state.items[${idx}].included[${mi}]=this.checked; renderTable(); renderSummary();">
          <span class="per-person" id="per-${idx}-${mi}">${item.included[mi] && item.amount > 0 ? fmt(per) : ''}</span>
        </div>
      </td>`;
    });

    cells += `<td><button class="btn-del" onclick="removeItem(${idx})">×</button></td>`;
    tr.innerHTML = cells;
    tbody.appendChild(tr);
  });

  // ─ Footer ─
  const tfoot = document.getElementById('itemsFoot');
  tfoot.innerHTML = '';
  const totals = calcItemTotals();
  const grandTotal = ai.reduce((s, i) => s + totals[i], 0);

  const tr2 = document.createElement('tr');
  tr2.className = 'total-row';
  let fcells = `<td></td>
    <td class="td-sticky" style="text-align:left">合計</td>
    <td id="foot-grand" style="text-align:right;font-variant-numeric:tabular-nums">${fmt(grandTotal)}</td>`;
  ai.forEach(i => {
    fcells += `<td id="foot-${i}" style="font-variant-numeric:tabular-nums">${totals[i] > 0 ? fmt(totals[i]) : ''}</td>`;
  });
  fcells += '<td></td>';
  tr2.innerHTML = fcells;
  tfoot.appendChild(tr2);
}

// 金額入力中: テーブル再描画せずに per-person 数字と合計だけ更新
function updateItemDisplay(idx) {
  const item = state.items[idx];
  const ai = activeIdx();
  const cnt = ai.filter(i => item.included[i]).length;
  const per = cnt > 0 ? item.amount / cnt : 0;

  ai.forEach(mi => {
    const span = document.getElementById(`per-${idx}-${mi}`);
    if (span) span.textContent = item.included[mi] && item.amount > 0 ? fmt(per) : '';
  });

  // フッター合計も更新
  const totals = calcItemTotals();
  const grandTotal = ai.reduce((s, i) => s + totals[i], 0);
  const grandEl = document.getElementById('foot-grand');
  if (grandEl) grandEl.textContent = fmt(grandTotal);
  ai.forEach(i => {
    const el = document.getElementById(`foot-${i}`);
    if (el) el.textContent = totals[i] > 0 ? fmt(totals[i]) : '';
  });
}

function renderAdjustments() {
  const grid = document.getElementById('adjGrid');
  grid.innerHTML = '';
  const payer = state.payerIndex;

  activeIdx().forEach(i => {
    const isPayer = i === payer;
    const div = document.createElement('div');
    div.className = 'adj-item';

    if (isPayer) {
      // 立替担当は自動計算・読み取り専用
      div.innerHTML = `
        <span class="adj-label">${state.members[i]}<span style="font-size:0.7rem;color:#1a3a5c;margin-left:4px">自動</span></span>
        <input class="adj-input" type="text" id="adj-payer-input"
          value="${state.adjustments[i] !== 0 ? (state.adjustments[i] > 0 ? '+' : '') + fmt(state.adjustments[i]) : '0'}"
          readonly style="background:#f0f4f8;color:#666;cursor:default;">
      `;
    } else {
      div.innerHTML = `
        <span class="adj-label">${state.members[i]}</span>
        <input class="adj-input" type="number" value="${state.adjustments[i] || ''}" placeholder="0"
          oninput="const v=parseFloat(this.value); state.adjustments[${i}]=isNaN(v)?0:v; syncPayerAdj(); updatePayerAdjDisplay(); renderSummary();">
      `;
    }
    grid.appendChild(div);
  });
}

// 立替担当の調整表示だけ更新（renderAdjustments全体を呼ばない）
function updatePayerAdjDisplay() {
  const el = document.getElementById('adj-payer-input');
  if (!el) return;
  const v = state.adjustments[state.payerIndex];
  el.value = v !== 0 ? (v > 0 ? '+' : '') + fmt(v) : '0';
}

function renderSummary() {
  const itemTotals = calcItemTotals();
  const ai = activeIdx();
  const net = state.members.map((_, i) => itemTotals[i] + state.adjustments[i]);

  // ─ Summary cards ─
  const grid = document.getElementById('summaryGrid');
  grid.innerHTML = '';
  ai.forEach(i => {
    const adj = state.adjustments[i];
    const div = document.createElement('div');
    div.className = 'summary-card';
    div.innerHTML = `
      <div class="s-name">${state.members[i]}${i === state.payerIndex ? '<span class="payer-badge">立替</span>' : ''}</div>
      <div class="s-amount">¥${fmt(net[i])}</div>
      ${adj !== 0 ? `<div class="s-detail">項目 ${fmt(itemTotals[i])} / 調整 ${adj > 0 ? '+' : ''}${fmt(adj)}</div>` : ''}
    `;
    grid.appendChild(div);
  });

  // ─ Settlement ─
  const payer = state.payerIndex;
  const ul = document.getElementById('settlementList');
  ul.innerHTML = '';

  const payments = ai
    .filter(i => i !== payer)
    .map(i => ({ from: i, amount: Math.round(net[i]) }))
    .filter(p => p.amount > 0);

  if (payments.length === 0) {
    ul.innerHTML = '<li class="no-settlement">精算不要</li>';
    saveState();
    return;
  }
  payments.forEach(({ from, amount }) => {
    const li = document.createElement('li');
    li.innerHTML = `
      <span><strong>${state.members[from]}</strong> <span class="s-arrow">→</span> <strong>${state.members[payer]}</strong> に支払う</span>
      <span class="s-pay-amount">¥${fmt(amount)}</span>
    `;
    ul.appendChild(li);
  });
  saveState();
}

// ── Actions ─────────────────────────────────────────────
function addItem() {
  const inc = state.members.map(m => m !== '');
  state.items.push({ name: '', amount: 0, included: inc });
  renderTable();
  renderSummary();
  setTimeout(() => {
    const rows = document.querySelectorAll('#itemsBody tr');
    if (rows.length) rows[rows.length - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function removeItem(idx) {
  if (state.items.length <= 1) {
    const inc = state.members.map(m => m !== '');
    state.items[0] = { name: '', amount: 0, included: inc };
  } else {
    state.items.splice(idx, 1);
  }
  renderTable();
  renderSummary();
}

function addMember() {
  state.members.push('');
  state.adjustments.push(0);
  state.items.forEach(item => item.included.push(true));
  syncPayerAdj();
  fullRender();
  // 追加した入力欄にフォーカス
  setTimeout(() => {
    const inputs = document.querySelectorAll('#membersGrid input[type="text"]');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 50);
}

function removeMember(i) {
  if (state.members.length <= 2) return;
  state.members.splice(i, 1);
  state.adjustments.splice(i, 1);
  state.items.forEach(item => item.included.splice(i, 1));
  if (state.payerIndex >= state.members.length) state.payerIndex = 0;
  syncPayerAdj();
  fullRender();
}

function fullRender() {
  renderMembers();
  renderPayer();
  renderTable();
  renderAdjustments();
  renderSummary();
  saveState();
}

// ── 保存・復元 ──────────────────────────────────────────
const STORAGE_KEY = 'seisan-app-state';

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    members: state.members,
    payerIndex: state.payerIndex,
    items: state.items,
    adjustments: state.adjustments,
  }));
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const parsed = JSON.parse(saved);
    if (parsed.members) state.members = parsed.members;
    if (parsed.payerIndex !== undefined) state.payerIndex = parsed.payerIndex;
    if (parsed.items) state.items = parsed.items;
    if (parsed.adjustments) state.adjustments = parsed.adjustments;
  } catch(e) {}
}

// renderSummary と fullRender の末尾に saveState を追加（上書き方式ではなく直接追記）

// ── Init ────────────────────────────────────────────────
loadState();
syncPayerAdj();
render();
</script>
</body>
</html>
